# CyberScan Pro - Streamlit Configuration
# Place this file in ~/.streamlit/config.toml or in the project root

[theme]
primaryColor = "#667eea"
backgroundColor = "#0f1419"
secondaryBackgroundColor = "#262730"
textColor = "#fafafa"
font = "sans serif"

[logger]
level = "info"

[client]
showErrorDetails = true
